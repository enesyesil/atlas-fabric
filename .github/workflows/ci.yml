name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy agents/ geo/ knowledge/ storage/ api/ cli/ --ignore-missing-imports

  # ── 2. Security ────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: bandit — static security analysis
        run: |
          bandit -r agents/ geo/ knowledge/ storage/ api/ cli/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt

      - name: pip-audit — dependency vulnerability scan
        run: pip-audit --requirement <(pip freeze) --ignore-vuln PYSEC-2024-272

      - name: Check .env is not committed
        run: |
          if git ls-files | grep -qE '^\.env$'; then
            echo "ERROR: .env is tracked by git. Remove it and add to .gitignore."
            exit 1
          fi
          echo ".env is not committed — OK"

      - name: Check for hardcoded secrets patterns
        run: |
          # Fail if any source file contains a bare API key pattern
          if grep -rn --include="*.py" \
            -E "(sk-[a-zA-Z0-9]{20,}|AIza[0-9A-Za-z_-]{35}|['\"]api_key['\"]:\s*['\"][^'\"]{20,}['\"])" \
            agents/ geo/ knowledge/ storage/ api/ cli/ ; then
            echo "ERROR: Possible hardcoded secret detected above."
            exit 1
          fi
          echo "No hardcoded secret patterns found — OK"

  # ── 3. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  # ── 4. Integration tests (optional — skipped when no API keys are configured) ──
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only attempt on main branch or PRs — and only when at least one API key secret exists.
    # If no secrets are configured this job is skipped entirely; CI still passes.
    if: |
      (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') &&
      (secrets.AZURE_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' || secrets.OPENAI_API_KEY != '')
    needs: [lint, security, test]

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://localhost:27017
      GENERATOR_MODEL: ${{ secrets.GENERATOR_MODEL }}
      REVIEWER_MODEL: ${{ secrets.REVIEWER_MODEL }}
      AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
      AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NATURAL_EARTH_DATA_PATH: ./data/ne_10m_admin_1_states_provinces.geojson
      API_SECRET_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      - name: Cache Natural Earth data
        id: cache-ne
        uses: actions/cache@v4
        with:
          path: data/ne_10m_admin_1_states_provinces.geojson
          key: natural-earth-admin1-v1

      - name: Download Natural Earth data
        if: steps.cache-ne.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          curl -L "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_1_states_provinces.zip" \
            -o /tmp/ne.zip
          unzip /tmp/ne.zip -d /tmp/ne
          mv /tmp/ne/ne_10m_admin_1_states_provinces.geojson data/

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
